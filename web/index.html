<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>86-DOS 1.14 in the browser</title>
<style>
  html, body { margin: 0; background: #111; color: #eee; font-family: system-ui, sans-serif; }
  header { padding: 8px 12px; border-bottom: 1px solid #333; font-size: 13px; }
  header a { color: #6cf; }
  #status { color: #aaa; margin-left: 12px; }
  main { padding: 12px; }
  #term {
    background: #000;
    color: #d4d4aa;
    padding: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 14px;
    line-height: 1.25;
    white-space: pre-wrap;
    overflow-y: auto;
    height: 70vh;
    outline: 1px solid #333;
    border-radius: 4px;
    cursor: text;
  }
  #term:focus { outline: 2px solid #6cf; }
  footer { padding: 8px 12px; color: #888; font-size: 12px; border-top: 1px solid #333; }
</style>
</head>
<body>
<header>
  86-DOS 1.14 (Tarbell DD) running on a JS 8086.
  <span id="status">loading…</span>
</header>
<main>
  <pre id="term" tabindex="0"></pre>
</main>
<footer>
  Click the terminal then type. Disk image from
  <a href="https://archive.org/details/86-dos-1.14">archive.org/details/86-dos-1.14</a>.
  Boot via on-disk SCP loader; BIOS routines trapped to JS via INT 0xE0+idx.
</footer>
<script type="module" src="./main.js"></script>
</body>
</html>
