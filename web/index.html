<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>86-DOS 1.14 — SCP S-100 in the browser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;400;700&family=IBM+Plex+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
  :root {
    --phosphor: #d4d4aa;
    --phosphor-dim: #8a8a6e;
    --phosphor-deep: #4a4a38;
    --warm-black: #0d0c08;
    --panel: #18160f;
    --rule: #2a2818;
    --accent: #ffb86b;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--warm-black);
    color: var(--phosphor-dim);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 300;
    min-height: 100vh;
  }
  body {
    background:
      radial-gradient(ellipse 80% 60% at 50% 45%, rgba(212, 212, 170, 0.04), transparent 70%),
      radial-gradient(ellipse 100% 100% at 50% 0%, rgba(255, 184, 107, 0.02), transparent 60%),
      var(--warm-black);
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 18px 28px 14px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: baseline;
    gap: 24px;
    flex-wrap: wrap;
  }
  header .title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 200;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: var(--phosphor);
  }
  header .title strong {
    font-weight: 700;
    color: var(--accent);
  }
  header .meta {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--phosphor-deep);
    margin-top: 4px;
  }
  #status {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 300;
    font-size: 12px;
    color: var(--phosphor-dim);
    letter-spacing: 0.04em;
  }
  #status::before {
    content: '● ';
    color: var(--accent);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  main {
    padding: 28px;
    display: flex;
    justify-content: center;
    flex: 1;
  }
  .crt-frame {
    position: relative;
    padding: 18px;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 6px;
    max-width: 100%;
    box-shadow:
      0 0 0 1px rgba(212, 212, 170, 0.04),
      0 30px 80px -30px rgba(212, 212, 170, 0.18),
      0 0 120px -40px rgba(255, 184, 107, 0.12);
  }
  .crt-frame::before {
    content: '';
    position: absolute;
    inset: 18px;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent 0,
      transparent 2px,
      rgba(0, 0, 0, 0.18) 2px,
      rgba(0, 0, 0, 0.18) 3px
    );
    z-index: 2;
    border-radius: 2px;
  }
  .crt-frame::after {
    content: '';
    position: absolute;
    inset: 18px;
    pointer-events: none;
    background: radial-gradient(ellipse 90% 80% at 50% 50%, transparent 60%, rgba(0, 0, 0, 0.5) 100%);
    z-index: 3;
    border-radius: 2px;
  }
  .screen { position: relative; line-height: 0; }
  #term {
    background: #000;
    display: block;
    image-rendering: pixelated;
    cursor: text;
    position: relative;
    z-index: 1;
    max-width: 100%;
    height: auto;
  }
  #kbd {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    background: transparent;
    border: 0;
    outline: 0;
    caret-color: transparent;
    color: transparent;
    font-size: 16px; /* prevent iOS auto-zoom on focus */
    z-index: 4;
    cursor: text;
    -webkit-appearance: none;
    appearance: none;
  }
  #term:focus {
    outline: 1px solid var(--accent);
    outline-offset: -1px;
  }
  .specs {
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--phosphor-deep);
  }
  .specs > div {
    padding: 6px 12px;
    border-right: 1px solid var(--rule);
  }
  .specs > div:last-child { border-right: none; }
  .specs strong {
    display: block;
    font-weight: 500;
    color: var(--phosphor-dim);
    margin-top: 2px;
    letter-spacing: 0.06em;
    text-transform: none;
    font-size: 12px;
  }
  footer {
    padding: 14px 28px 18px;
    border-top: 1px solid var(--rule);
    color: var(--phosphor-deep);
    font-size: 11px;
    letter-spacing: 0.04em;
    line-height: 1.7;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: space-between;
  }
  footer a {
    color: var(--phosphor-dim);
    text-decoration: none;
    border-bottom: 1px dotted var(--phosphor-deep);
    padding-bottom: 1px;
    transition: color 0.12s, border-color 0.12s;
  }
  footer a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  footer .remix {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 400;
    color: var(--phosphor-dim);
    letter-spacing: 0.06em;
  }
  footer .remix::before {
    content: '↳ ';
    color: var(--accent);
  }
  @media (max-width: 760px) {
    header { padding: 12px 16px 10px; gap: 8px; }
    header .title { font-size: 17px; }
    header .meta { font-size: 9px; letter-spacing: 0.14em; }
    #status { width: 100%; margin-left: 0; font-size: 11px; }
    main { padding: 0; }
    .crt-frame {
      padding: 0;
      border-radius: 0;
      border-left: none;
      border-right: none;
      width: 100%;
      box-shadow: none;
    }
    .crt-frame::before, .crt-frame::after { inset: 0; border-radius: 0; }
    #term { width: 100%; }
    .specs {
      grid-template-columns: repeat(2, 1fr);
      padding: 8px 16px;
      margin-top: 0;
      border-top: 1px solid var(--rule);
    }
    .specs > div { padding: 6px 8px; }
    .specs > div:nth-child(2) { border-right: none; }
    .specs strong { font-size: 11px; }
    footer { padding: 12px 16px 14px; font-size: 10px; gap: 10px; }
  }
  @media (max-width: 380px) {
    .specs { grid-template-columns: 1fr; }
    .specs > div { border-right: none; border-bottom: 1px solid var(--rule); }
    .specs > div:last-child { border-bottom: none; }
  }
</style>
</head>
<body>
<header>
  <div>
    <div class="title">86-DOS <strong>1.14</strong> <span style="color: var(--phosphor-deep); font-weight: 200;">/ Tarbell DD</span></div>
    <div class="meta">Seattle Computer Products S-100 · 8086 · 8&quot; floppy</div>
  </div>
  <div id="status">loading…</div>
</header>
<main>
  <div class="crt-frame">
    <div class="screen">
      <canvas id="term" tabindex="0"></canvas>
      <input id="kbd" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text" aria-label="terminal input">
    </div>
    <div class="specs">
      <div>CPU<strong>JS 8086</strong></div>
      <div>BIOS<strong>9-vec SCP shim</strong></div>
      <div>VDU<strong>80×24 glass-TTY</strong></div>
      <div>Boot<strong>on-disk SCP loader</strong></div>
    </div>
  </div>
</main>
<footer>
  <div>
    Click the terminal then type. Image:
    <a href="https://archive.org/details/86-dos-1.14">archive.org/details/86-dos-1.14</a>.
    Source &amp; build:
    <a href="https://github.com/vgrichina/dos10">github.com/vgrichina/dos10</a>.
  </div>
  <div class="remix"><a href="/remix">Remix on Berrry</a></div>
</footer>
<script type="module" src="./main.js"></script>
</body>
</html>
